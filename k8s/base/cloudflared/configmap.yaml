apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: horsetraining
data:
  config.yaml: |
    tunnel: horsetraining
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      - hostname: tqa.tylerrhinehart.com
        service: http://web.horsetraining.svc.cluster.local:80
      - service: http_status:404
