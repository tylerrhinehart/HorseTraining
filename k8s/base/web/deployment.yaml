apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: horsetraining
  labels: { app: horsetraining, service: web }
spec:
  replicas: 1
  selector:
    matchLabels: { app: horsetraining, service: web }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels: { app: horsetraining, service: web }
    spec:
      containers:
        - name: web
          image: k3s01.local.tylerrhinehart.com:5000/horsetraining/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { memory: 128Mi }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
