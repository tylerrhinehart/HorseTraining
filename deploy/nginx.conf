server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA history fallback — every unknown path falls back to index.html so
  # react-router can pick up deep links on a hard refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed Vite assets; the filenames change on every build.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Don't cache the SPA shell — it references the latest hashed assets.
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # PWA service worker must always be revalidated.
  location = /sw.js {
    add_header Cache-Control "no-store";
  }
}
