# Copy to deploy/secrets.yaml and fill in real values.
# deploy/secrets.yaml is gitignored.
#
# This app has no server-side secrets at runtime — Supabase URL/anon key are
# baked into the Vite bundle at build time and passed to docker build via
# --build-arg from scripts/deploy.sh, sourced from .env.local or your shell.
#
# Only the cloudflared tunnel credentials live in cluster secrets.
#
# Tunnel setup (one-time):
#   cloudflared tunnel login
#   cloudflared tunnel create horsetraining
#   cloudflared tunnel route dns horsetraining tqa.tylerrhinehart.com
#   cat ~/.cloudflared/<tunnel-id>.json   # paste below
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-credentials
  namespace: horsetraining
type: Opaque
stringData:
  credentials.json: |
    {
      "AccountTag":   "CHANGE_ME",
      "TunnelSecret": "CHANGE_ME_base64",
      "TunnelID":     "CHANGE_ME_uuid"
    }
